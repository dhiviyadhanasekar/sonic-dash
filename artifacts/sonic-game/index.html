<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!--
      OWASP A05 – Security Misconfiguration
      Content Security Policy restricts what resources this page may load.
      'unsafe-eval' is required by Vite HMR in development only.
    -->
    <!--
      frame-ancestors is intentionally omitted from this meta CSP — it is
      only honoured in HTTP response headers, not meta elements (per spec).
      Configure it on the server / CDN instead.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss:; worker-src blob:;"
    />

    <!-- Prevent MIME-type sniffing (OWASP A05) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Referrer policy — don't leak URL to external resources -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>Sonic Two-Player Game</title>
    <meta name="description" content="A two-player Sonic-style ring-collection race. First to 15 rings wins!" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Sonic Two-Player Game" />
    <meta property="og:description" content="A two-player Sonic-style ring-collection race. First to 15 rings wins!" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sonic Two-Player Game" />
    <meta name="twitter:description" content="A two-player Sonic-style ring-collection race. First to 15 rings wins!" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts — crossorigin on both preconnects (best practice) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
